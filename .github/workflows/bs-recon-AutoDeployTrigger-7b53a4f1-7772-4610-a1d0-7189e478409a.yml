name: Trigger auto deployment for bs-recon

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.BSRECON_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: bsreconacr.azurecr.io
          registryUsername: ${{ secrets.BSRECON_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BSRECON_REGISTRY_PASSWORD }}
          containerAppName: bs-recon
          resourceGroup: bs-recon-rg
          imageToBuild: bsreconacr.azurecr.io/bs-recon:${{ github.sha }}
