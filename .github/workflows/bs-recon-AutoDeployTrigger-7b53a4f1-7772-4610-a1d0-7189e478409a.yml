name: Trigger auto deployment for bs-recon

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.BSRECON_AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: bsreconacr.azurecr.io
          username: ${{ secrets.BSRECON_REGISTRY_USERNAME }}
          password: ${{ secrets.BSRECON_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            bsreconacr.azurecr.io/bs-recon:${{ github.sha }}
            bsreconacr.azurecr.io/bs-recon:latest

      - name: Deploy to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name bs-recon \
              --resource-group bs-recon-rg \
              --image bsreconacr.azurecr.io/bs-recon:${{ github.sha }} \
              --set-env-vars \
                "PAX8_CLIENT_ID=${{ secrets.PAX8_CLIENT_ID }}" \
                "PAX8_CLIENT_SECRET=${{ secrets.PAX8_CLIENT_SECRET }}"
