name: Trigger auto deployment for bs-recon

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/bs-recon-AutoDeployTrigger-7b53a4f1-7772-4610-a1d0-7189e478409a.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.BSRECON_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: bsreconacr.azurecr.io
          registryUsername: ${{ secrets.BSRECON_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BSRECON_REGISTRY_PASSWORD }}
          containerAppName: bs-recon
          resourceGroup: bs-recon-rg
          imageToBuild: bsreconacr.azurecr.io/bs-recon:${{ github.sha }}
          
            

     

